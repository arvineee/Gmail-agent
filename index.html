<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gmail AI Agent - Delete Enabled</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;
    --accent:#7c6aff;--accent2:#ff6a9e;--green:#4fffb0;
    --text:#e8e8f0;--muted:#6a6a8a;
    --font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden}
  .app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 20px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .logo-text{font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-.5px}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px}
  .status-dot.active{background:var(--green);box-shadow:0 0 8px var(--green)}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px}
  .panel-title{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
  input,textarea{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;margin-bottom:10px}
  .btn{padding:10px 20px;border:none;border-radius:8px;font-family:var(--font-head);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#9b8aff);color:#fff}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-danger{background:rgba(255,80,80,.1);color:#ff6060;border:1px solid rgba(255,80,80,.2)}
  .btn-danger:hover{background:rgba(255,80,80,.2)}
  .email-item{padding:16px 24px;border-bottom:1px solid var(--border);cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
  .email-item.selected{background:rgba(124,106,255,.08);border-left:3px solid var(--accent)}
  .cat-chip{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;text-transform:uppercase}
  .cat-work{background:rgba(124,106,255,.15);color:var(--accent)}
  .cat-personal{background:rgba(255,106,158,.15);color:var(--accent2)}
  .cat-urgent{background:rgba(255,80,80,.15);color:#ff6060}
  .ai-section{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:16px}
  .loading-bar{height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));background-size:200%;animation:shimmer 1.5s infinite}
  @keyframes shimmer{to{background-position:-200% center}}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><div class="logo-icon">📬</div><div class="logo-text">Mail<span>Agent</span></div></div>
    <div style="font-size:12px;color:var(--muted)"><span class="status-dot" id="statusDot"></span><span id="statusText">Disconnected</span></div>
  </header>

  <div class="panel">
    <div class="panel-title">Credentials</div>
    <input type="password" id="geminiKey" placeholder="Gemini API Key (AIza...)"/>
    <input type="text" id="googleClientId" placeholder="OAuth Client ID (...apps.googleusercontent.com)"/>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="connectGmail()">Connect Gmail</button>
      <button class="btn btn-secondary" id="fetchBtn" onclick="fetchEmails()" disabled>Refresh Inbox</button>
    </div>
  </div>

  <div class="panel" style="padding:0">
    <div id="emailList"><div style="padding:40px;text-align:center;color:var(--muted)">Connect to load emails</div></div>
  </div>

  <div class="panel hidden" id="detailPanel">
    <div style="display:flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
        <h2 id="detailSubject" style="max-width: 80%;"></h2>
        <button class="btn btn-danger" onclick="deleteEmail()">🗑️ Trash</button>
    </div>
    
    <div id="aiLoader" class="hidden">
      <div class="loading-bar"></div>
      <p style="font-size:11px;margin-top:8px">AI IS ANALYZING...</p>
    </div>

    <div id="aiResults" class="hidden">
      <div class="ai-section"><div id="aiSummary"></div></div>
      <div class="ai-section">
        <label style="font-size:10px;color:var(--accent)">AI DRAFT</label>
        <textarea id="replyBox" style="min-height:150px;margin-top:10px"></textarea>
        <button class="btn btn-primary" onclick="sendReply()">Send Reply</button>
      </div>
    </div>
  </div>
</div>

<script>
let accessToken = null;
let emails = [];
let selectedEmail = null;
const catCache = {};

function connectGmail() {
  const clientId = document.getElementById('googleClientId').value.trim();
  if(!clientId) return alert("Enter Client ID");
  // Added gmail.modify scope to allow trashing/deleting
  const scope = "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.modify";
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${window.location.origin}${window.location.pathname}&response_type=token&scope=${encodeURIComponent(scope)}`;
  const win = window.open(url, "_blank", "width=500,height=600");
  
  const timer = setInterval(() => {
    try {
      if (win.location.hash) {
        accessToken = new URLSearchParams(win.location.hash.substring(1)).get('access_token');
        if (accessToken) {
          clearInterval(timer); win.close();
          document.getElementById('statusDot').classList.add('active');
          document.getElementById('statusText').innerText = "Connected";
          document.getElementById('fetchBtn').disabled = false;
          fetchEmails();
        }
      }
    } catch(e){}
  }, 500);
}

async function fetchEmails() {
  const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=10&labelIds=INBOX', {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  if(!data.messages) {
      document.getElementById('emailList').innerHTML = '<div style="padding:40px;text-align:center;">Inbox empty!</div>';
      return;
  }
  emails = await Promise.all(data.messages.map(async m => {
    const detail = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    }).then(r => r.json());
    return { 
      id: m.id, 
      snippet: detail.snippet,
      subject: detail.payload.headers.find(h => h.name === 'Subject')?.value || 'No Subject',
      from: detail.payload.headers.find(h => h.name === 'From')?.value || 'Unknown'
    };
  }));
  renderList();
}

function renderList() {
  document.getElementById('emailList').innerHTML = emails.map((e, i) => `
    <div class="email-item ${selectedEmail && selectedEmail.id === e.id ? 'selected' : ''}" onclick="selectEmail(${i})">
      <span class="cat-chip ${catCache[e.id] ? 'cat-'+catCache[e.id] : ''}">${catCache[e.id] || 'NEW'}</span>
      <div>
        <div style="font-weight:bold">${e.from.split('<')[0]}</div>
        <div style="font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px;">${e.subject}</div>
      </div>
    </div>
  `).join('');
}

async function selectEmail(i) {
  selectedEmail = emails[i];
  renderList();
  document.getElementById('detailPanel').classList.remove('hidden');
  document.getElementById('detailSubject').innerText = selectedEmail.subject;
  document.getElementById('aiResults').classList.add('hidden');
  document.getElementById('aiLoader').classList.remove('hidden');
  
  const key = document.getElementById('geminiKey').value;
  analyzeWithGemini(selectedEmail.snippet, key);
}

async function analyzeWithGemini(body, key) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `Analyze this email snippet: ${body}` }] }],
        generationConfig: {
          response_mime_type: "application/json",
          response_schema: {
            type: "OBJECT",
            properties: {
              summary: { type: "STRING" },
              category: { type: "STRING", enum: ["work", "personal", "urgent", "other"] },
              reply: { type: "STRING" }
            },
            required: ["summary", "category", "reply"]
          }
        }
      })
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const p = JSON.parse(data.candidates[0].content.parts[0].text);

    catCache[selectedEmail.id] = p.category;
    renderList();
    
    document.getElementById('aiLoader').classList.add('hidden');
    document.getElementById('aiResults').classList.remove('hidden');
    document.getElementById('aiSummary').innerText = p.summary;
    document.getElementById('replyBox').value = p.reply;
    
  } catch (e) {
    console.error(e);
    alert("AI Analysis Error: Check Console");
  }
}

async function deleteEmail() {
    if(!selectedEmail || !confirm("Move this email to Trash?")) return;
    
    try {
        const res = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${selectedEmail.id}/trash`, {
            method: 'POST',
            headers: { Authorization: `Bearer ${accessToken}` }
        });
        if(res.ok) {
            alert("Moved to Trash");
            document.getElementById('detailPanel').classList.add('hidden');
            fetchEmails(); // Refresh list
        } else {
            throw new Error("Failed to delete");
        }
    } catch(e) {
        alert("Error trashing email: " + e.message);
    }
}

async function sendReply() {
  const replyText = document.getElementById('replyBox').value;
  const raw = btoa(`To: ${selectedEmail.from}\r\nSubject: Re: ${selectedEmail.subject}\r\n\r\n${replyText}`).replace(/\+/g, '-').replace(/\//g, '_');
  
  try {
      await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ raw })
      });
      alert("Reply Sent!");
  } catch(e) {
      alert("Send error: " + e.message);
  }
}
</script>
</body>
</html>
